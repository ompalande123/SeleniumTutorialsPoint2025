name: Selenium Actions Runner created by omkar on 11 June 2026

on:
  workflow_dispatch:

  schedule:
    - cron: '00 17 * * *' # Runs every day at 17:00 UTC (adjust as needed)    
  

jobs:
  execute-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Java
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: temurin

    - name: setup chrome
      uses: browser-actions/setup-chrome@latest


    - name: Build and run tests with Maven
      run: mvn clean test
